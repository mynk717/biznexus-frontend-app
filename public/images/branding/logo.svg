<svg xmlns="http://www.w3.org/2000/svg" width="280" height="70" viewBox="0 0 280 70">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <circle cx="24" cy="24" r="9" fill="#fdd04c"/>
    <circle cx="24" cy="46" r="9" fill="#784cfd"/>
    <circle cx="52" cy="35" r="9" fill="#4cd2fd"/>
    <line x1="24" y1="24" x2="52" y2="35" stroke="#4c79fd" stroke-width="3.5"/>
    <line x1="24" y1="46" x2="52" y2="35" stroke="#4c79fd" stroke-width="3.5"/>
  </g>
  
  <text x="75" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="url(#textGradient)">MDNetwork</text>
</svg>
